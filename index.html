<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Aura Shop</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
    }
    h1 {
      background: black;
      color: white;
      padding: 15px;
    }
    .products {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }
    .product {
      background: white;
      margin: 15px;
      padding: 15px;
      border-radius: 10px;
      width: 250px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    img {
      width: 100%;
      border-radius: 10px;
    }
    .price {
      font-size: 20px;
      color: green;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h1>Aura Clothing</h1>

<div class="products" id="products"></div>

<script>
const items = [
  { name: "Mikina Aura", category: "hoodie", price: 899 },
  { name: "Tepláky Aura", category: "sweatpants", price: 799 },
  { name: "Tričko Aura", category: "tshirt", price: 499 }
];

function randomImage(category) {
  return `https://source.unsplash.com/300x300/?${category},clothing`;
}

function generateProducts() {
  const container = document.getElementById("products");

  for (let i = 0; i < 9; i++) {
    const item = items[Math.floor(Math.random() * items.length)];

    const div = document.createElement("div");
    div.className = "product";

    div.innerHTML = `
      <img src="${randomImage(item.category)}" alt="${item.name}">
      <h3>${item.name}</h3>
      <p class="price">${item.price} Kč</p>
    `;

    container.appendChild(div);
  }
}

generateProducts();
</script>

</body>
</html>
