<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blacktracksuit & Whitetracksuit Store</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #111;
        }

        header {
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        .brand-name {
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .container {
            max-width: 1000px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .sustainable-badge {
            background-color: #f0fdf4;
            color: #166534;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.9rem;
            margin-bottom: 40px;
            text-align: center;
            border: 1px solid #dcfce7;
        }

        .product-grid {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .product-card {
            width: 400px;
            text-align: center;
            margin-bottom: 40px;
        }

        .product-image {
            width: 100%;
            height: auto;
            background-color: #f9f9f9;
            transition: opacity 0.3s;
        }

        .product-image:hover {
            opacity: 0.9;
        }

        .product-info {
            margin-top: 20px;
        }

        .product-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .product-price {
            font-size: 1.1rem;
            color: #444;
            margin-bottom: 15px;
        }

        .eco-tag {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #166534;
            font-weight: bold;
            margin-bottom: 15px;
            display: block;
        }

        .buy-button {
            display: inline-block;
            background-color: #000;
            color: #fff;
            padding: 12px 30px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 2px;
            transition: background 0.3s;
        }

        .buy-button:hover {
            background-color: #333;
        }

        footer {
            text-align: center;
            padding: 40px;
            font-size: 0.8rem;
            color: #888;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-name">HELLO WORLD</div>
    </header>

    <div class="container">
        <div class="sustainable-badge">
            🌱 Naše produkty jsou vyrobeny ze **100% recyklovaných materiálů**. Šetříme planetu, aniž bychom obětovali styl.
        </div>

        <div class="product-grid">
            
            <div class="product-card">
                <img src="Blacktracksuit.png" alt="Blacktracksuit" class="product-image">
                <div class="product-info">
                    <span class="eco-tag">Recyklovaný materiál</span>
                    <div class="product-name">Blacktracksuit</div>
                    <div class="product-price">1 490 Kč</div>
                    <a href="#" class="buy-button">DO KOŠÍKU</a>
                </div>
            </div>

            <div class="product-card">
                <img src="Whitetracksuit.png" alt="Whitetracksuit" class="product-image">
                <div class="product-info">
                    <span class="eco-tag">Recyklovaný materiál</span>
                    <div class="product-name">Whitetracksuit</div>
                    <div class="product-price">1 490 Kč</div>
                    <a href="#" class="buy-button">DO KOŠÍKU</a>
                </div>
            </div>

        </div>
    </div>

    <footer>
        &copy; 2026 HELLO WORLD. Všechna práva vyhrazena.
    </footer>

</body>
</html>
